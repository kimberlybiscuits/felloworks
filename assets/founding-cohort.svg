  <!-- Gap in ring at top — suggests opening, not a closed system yet -->
  <!-- Achieved by placing an arc that matches background over the ring arc -->
  <path d="M 322 193 A 148 148 0 0 1 358 193" stroke="none" stroke-width="3" style="fill:rgb(245, 240, 232);stroke:none;color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Small horizontal rule mark — editorial accent, bottom region -->
