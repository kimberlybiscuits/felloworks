<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — FelloWorks</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    body {
      background-color: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-8) var(--space-6);
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--rule-solid);
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-10) var(--space-8) var(--space-8);
      gap: var(--space-6);
    }

    .login-wordmark {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      text-align: center;
    }

    .login-tagline {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-align: center;
      margin: calc(var(--space-4) * -1) 0 0;
    }

    .login-fields {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .login-label {
      display: block;
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .login-hint {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
      text-align: center;
      margin: calc(var(--space-2) * -1) 0 0;
    }

    .login-submit {
      width: 100%;
      justify-content: center;
      font-size: 0.8125rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      padding: var(--space-4);
    }

    .login-back {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      border-bottom: 1px solid var(--rule-solid);
      padding-bottom: 1px;
    }

    .login-back:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .login-footer {
      margin-top: var(--space-8);
      display: flex;
      gap: var(--space-6);
    }

    .login-footer a {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      opacity: 0.6;
    }

    .login-footer a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-wordmark">FelloWorks</div>
    <p class="login-tagline">Reset your password</p>

    <div id="error" class="alert alert--error" hidden style="width:100%"></div>
    <div id="success" class="alert alert--success" hidden style="width:100%"></div>

    <div class="login-fields" id="form-area">
      <p class="login-hint">Enter your email and we'll send you a reset link.</p>
      <div class="form-group">
        <label class="login-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="name@example.com" autocomplete="email" />
      </div>
    </div>

    <button class="btn btn--primary login-submit" id="submit-btn">Send reset link</button>

    <a href="/login.html" class="login-back">Back to sign in</a>
  </div>

  <nav class="login-footer">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
    <a href="mailto:hello@fello.works">Support</a>
  </nav>

  <script type="module">
    import { sendPasswordReset } from "./js/supabase-client.js";

    const btn     = document.getElementById("submit-btn");
    const errEl   = document.getElementById("error");
    const succEl  = document.getElementById("success");
    const formArea = document.getElementById("form-area");

    btn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();

      if (!email) {
        errEl.textContent = "Please enter your email address.";
        errEl.hidden = false;
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending…";
      errEl.hidden = true;

      try {
        await sendPasswordReset(email);
        formArea.hidden = true;
        btn.hidden = true;
        succEl.textContent = "Check your email — a reset link is on its way.";
        succEl.hidden = false;
      } catch (err) {
        errEl.textContent = err.message || "Could not send reset email. Try again.";
        errEl.hidden = false;
        btn.disabled = false;
        btn.textContent = "Send reset link";
      }
    });

    document.getElementById("email").addEventListener("keydown", (e) => {
      if (e.key === "Enter") btn.click();
    });
  </script>
</body>
</html>
