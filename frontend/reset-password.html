<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set new password — FelloWorks</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <style>
    body {
      background-color: var(--bg-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-8) var(--space-6);
    }

    .login-card {
      background: var(--bg-surface);
      border: 1px solid var(--rule-solid);
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-10) var(--space-8) var(--space-8);
      gap: var(--space-6);
    }

    .login-wordmark {
      font-family: var(--font-display);
      font-size: 1.125rem;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      text-align: center;
    }

    .login-tagline {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-align: center;
      margin: calc(var(--space-4) * -1) 0 0;
    }

    .login-fields {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .login-label {
      display: block;
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
    }

    .login-submit {
      width: 100%;
      justify-content: center;
      font-size: 0.8125rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      padding: var(--space-4);
    }

    .login-footer {
      margin-top: var(--space-8);
      display: flex;
      gap: var(--space-6);
    }

    .login-footer a {
      font-family: var(--font-body);
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-secondary);
      text-decoration: none;
      opacity: 0.6;
    }

    .login-footer a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-wordmark">FelloWorks</div>
    <p class="login-tagline">Set new password</p>

    <div id="error" class="alert alert--error" hidden style="width:100%"></div>

    <div class="login-fields" id="form-area">
      <div class="form-group">
        <label class="login-label" for="password">New password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label class="login-label" for="confirm">Confirm password</label>
        <input class="form-input" type="password" id="confirm" placeholder="••••••••" autocomplete="new-password" />
      </div>
    </div>

    <button class="btn btn--primary login-submit" id="submit-btn">Update password</button>
  </div>

  <nav class="login-footer">
    <a href="/privacy.html">Privacy</a>
    <a href="/terms.html">Terms</a>
    <a href="mailto:hello@fello.works">Support</a>
  </nav>

  <script type="module">
    import { supabase, updatePassword } from "./js/supabase-client.js";

    const btn    = document.getElementById("submit-btn");
    const errEl  = document.getElementById("error");

    // Supabase fires PASSWORD_RECOVERY once it exchanges the token from the URL.
    // Until that event arrives the button stays disabled so the user can't submit
    // before the session is ready.
    btn.disabled = true;

    supabase.auth.onAuthStateChange(async (event) => {
      if (event === "PASSWORD_RECOVERY") {
        btn.disabled = false;
      }
    });

    btn.addEventListener("click", async () => {
      const password = document.getElementById("password").value;
      const confirm  = document.getElementById("confirm").value;

      if (!password || !confirm) {
        errEl.textContent = "Please fill in both fields.";
        errEl.hidden = false;
        return;
      }

      if (password !== confirm) {
        errEl.textContent = "Passwords don't match.";
        errEl.hidden = false;
        return;
      }

      if (password.length < 8) {
        errEl.textContent = "Password must be at least 8 characters.";
        errEl.hidden = false;
        return;
      }

      btn.disabled = true;
      btn.textContent = "Updating…";
      errEl.hidden = true;

      try {
        await updatePassword(password);
        window.location.href = "/login.html";
      } catch (err) {
        errEl.textContent = err.message || "Could not update password. Try again.";
        errEl.hidden = false;
        btn.disabled = false;
        btn.textContent = "Update password";
      }
    });
  </script>
</body>
</html>
